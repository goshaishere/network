name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
        working-directory: backend
      - name: Ruff format
        run: ruff format --check .
        working-directory: backend

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: network
          POSTGRES_PASSWORD: network
          POSTGRES_DB: network_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Pytest
        run: pytest
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: postgres://network:network@localhost:5432/network_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, test, build
        run: npm ci && npm run lint && npm run typecheck && npm run test && npm run build
        working-directory: frontend
