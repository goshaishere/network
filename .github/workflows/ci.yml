name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
        working-directory: backend
      - name: Ruff format
        run: ruff format --check .
        working-directory: backend

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: network
          POSTGRES_PASSWORD: network
          POSTGRES_DB: network_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Pytest
        run: pytest
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: postgres://network:network@localhost:5432/network_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, test, build
        run: npm ci && npm run lint && npm run typecheck && npm run test && npm run build
        working-directory: frontend

  compose-validate:
    runs-on: ubuntu-latest
    needs: [secrets-scan, backend-lint, backend-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate docker-compose.stack.yml
        env:
          NETWORK_BACKEND_IMAGE: ghcr.io/example/network/backend:ci
          NETWORK_FRONTEND_IMAGE: ghcr.io/example/network/frontend:ci
        run: docker compose -f docker-compose.stack.yml config --quiet
      - name: Validate docker-compose.observability.yml (stub bearer.token)
        run: |
          echo "ci-token" > infra/observability/bearer.token
          docker compose -f docker-compose.yml -f docker-compose.observability.yml config --quiet
          rm -f infra/observability/bearer.token

  docker-verify:
    runs-on: ubuntu-latest
    needs: [secrets-scan, backend-lint, backend-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: network-backend:ci
      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: network-frontend:ci

  docker-build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [compose-validate, docker-verify]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Registry image prefix (GHCR lowercases)
        id: reg
        run: |
          echo "owner_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.reg.outputs.owner_repo }}/backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.reg.outputs.owner_repo }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.reg.outputs.owner_repo }}/frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.reg.outputs.owner_repo }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
