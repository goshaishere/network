name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - production
      image_tag:
        description: "Image tag (sha-...)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cd /opt/network
            export IMAGE_TAG='${{ inputs.image_tag }}'
            docker compose pull
            docker compose up -d
            docker compose exec -T api python manage.py migrate --noinput
            curl -fsS http://127.0.0.1:8000/api/v1/health/

  rollback-note:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Rollback instruction
        run: echo "Deployment failed. Re-run with previous image tag to rollback."
