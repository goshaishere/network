name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - production
      image_tag:
        description: "Image tag (e.g. sha-<full_commit_sha> or latest)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export NETWORK_BACKEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/backend:${{ inputs.image_tag }}"
            export NETWORK_FRONTEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/frontend:${{ inputs.image_tag }}"
            cd /opt/network
            git pull --ff-only || true
            docker compose -f docker-compose.stack.yml pull
            docker compose -f docker-compose.stack.yml up -d
            curl -fsS "http://127.0.0.1/api/v1/health/ready/"

  rollback-note:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Rollback instruction
        run: |
          echo "Deployment failed. Re-run workflow with previous image tag (e.g. earlier sha-... or latest)."
          echo "On server: docker compose -f docker-compose.stack.yml pull && docker compose -f docker-compose.stack.yml up -d"
