# Стек для сервера / staging / prod: образы из registry, без монтирования исходников.
# Пример:
#   export NETWORK_BACKEND_IMAGE=ghcr.io/owner/network/backend:sha-abc...
#   export NETWORK_FRONTEND_IMAGE=ghcr.io/owner/network/frontend:sha-abc...
#   docker compose -f docker-compose.stack.yml --env-file .env.prod up -d
#
# Переменные NETWORK_* обязательны (или задать в .env рядом с compose).

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-network}
      POSTGRES_USER: ${POSTGRES_USER:-network}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-network}
    volumes:
      - pgdata_stack:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-network} -d ${POSTGRES_DB:-network}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: ${NETWORK_BACKEND_IMAGE:?Set NETWORK_BACKEND_IMAGE to ghcr.io/.../backend:tag}
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY:-change-me-set-in-env}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-network}
      POSTGRES_USER: ${POSTGRES_USER:-network}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-network}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    image: ${NETWORK_FRONTEND_IMAGE:?Set NETWORK_FRONTEND_IMAGE to ghcr.io/.../frontend:tag}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_stack:
